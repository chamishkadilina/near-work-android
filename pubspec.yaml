name: nearwork
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  cloud_firestore: ^6.5.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.5.2
  firebase_core: ^4.10.0
  flutter:
    sdk: flutter
  file_picker: 10.3.10
  flutter_svg: ^2.3.0
  geolocator: ^14.0.2
